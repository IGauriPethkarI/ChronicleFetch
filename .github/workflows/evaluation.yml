name: CS7IS3 Assignment 2 - Search Engine Evaluation
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and Test Search Engine
        run: |
          echo "=== CS7IS3 Assignment 2 - Search Engine Test ==="
          
          # Check project structure
          echo "📋 Checking project structure..."
          if [ ! -f "pom.xml" ]; then
            echo "❌ No Maven project found"
            exit 1
          fi
          echo "✅ Found Maven project"
          
          if [ ! -d "src/main/java" ]; then
            echo "❌ No Java source code found"
            exit 1
          fi
          echo "✅ Found Java source code"
          
          if [ ! -f "topics" ]; then
            echo "❌ No topics file found"
            exit 1
          fi
          echo "✅ Found topics file"
          
          if [ ! -d "Assignment Two" ]; then
            echo "❌ No dataset found"
            exit 1
          fi
          echo "✅ Found dataset directory"
          
          # Build project
          echo "🔨 Building project..."
          mvn clean package -q
          echo "✅ Build completed successfully"
          
          # Create directories
          mkdir -p index runs out
          
          # Run search engine
          echo "🚀 Running search engine..."
          echo "📚 Indexing documents..."
          java -jar target/cs7is3-search-1.0.0.jar index --docs "Assignment Two" --index index
          
          echo "🔍 Searching topics..."
          java -jar target/cs7is3-search-1.0.0.jar search --index index --topics topics --output runs/student.run --numDocs 1000
          
          echo "✅ Search completed successfully"

      - name: Evaluate Results
        run: |
          echo "📈 Evaluating results..."
          python3 tools/evaluate.py out/qrels.assignment2.part1 runs/student.run --out_csv out/standings.csv --out_md out/standings.md
          echo "✅ Evaluation completed"

      - name: Display Results
        run: |
          echo "=== SEARCH ENGINE EVALUATION RESULTS ==="
          if [ -f "out/standings.md" ]; then
            echo "📊 Performance Metrics:"
            cat out/standings.md
            echo ""
            echo "📈 Detailed Results:"
            if [ -f "out/standings.csv" ]; then
              cat out/standings.csv
            fi
          else
            echo "❌ No evaluation results found"
          fi

      - name: Publish Summary
        run: |
          echo "## 🔍 CS7IS3 Assignment 2 - Search Engine Evaluation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Performance Metrics" >> $GITHUB_STEP_SUMMARY
          if [ -f "out/standings.md" ]; then
            cat out/standings.md >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No evaluation results available" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 Key Metrics:" >> $GITHUB_STEP_SUMMARY
          if [ -f "out/standings.csv" ]; then
            best=$(tail -n +2 out/standings.csv | head -n1)
            IFS=',' read -r rank run MAP P20 nDCG <<< "$best"
            echo "- **MAP (Mean Average Precision)**: $MAP" >> $GITHUB_STEP_SUMMARY
            echo "- **P@20 (Precision at 20)**: $P20" >> $GITHUB_STEP_SUMMARY
            echo "- **nDCG@20 (Normalized DCG at 20)**: $nDCG" >> $GITHUB_STEP_SUMMARY
            echo "map=$MAP" >> $GITHUB_OUTPUT
            echo "p20=$P20" >> $GITHUB_OUTPUT
            echo "ndcg20=$nDCG" >> $GITHUB_OUTPUT
          fi
        id: summary

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: search-engine-evaluation-results
          path: |
            out/standings.csv
            out/standings.md
            runs/student.run
            out/qrels.assignment2.part1